<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1.0'><title>RV Park Acquisitions Copilot v1.0</title><style>*{font-family:-apple-system,sans-serif;margin:0;padding:0;box-sizing:border-box}body{background:#f1f5f9;padding:24px}.header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:32px;border-radius:16px;margin-bottom:24px;text-align:center}.header h1{font-size:2em;margin-bottom:8px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}.stat{background:#fff;padding:20px;border-radius:12px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.08)}.stat-num{font-size:2.2em;font-weight:800;color:#10b981}.filters{display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap}.filter-btn{padding:10px 22px;border-radius:25px;border:2px solid #3b82f6;background:#fff;color:#3b82f6;cursor:pointer;font-weight:600}.filter-btn.active{background:#3b82f6;color:#fff}.table-wrap{background:#fff;border-radius:16px;overflow:auto;margin-bottom:24px}table{width:100%;border-collapse:collapse;min-width:900px}th{background:#f8fafc;padding:16px;text-align:left;font-weight:700;color:#374151;border-bottom:2px solid #e2e8f0}td{padding:14px 16px;border-bottom:1px solid #f1f5f9}.badge{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700}.badge-new{background:#fef3c7;color:#92400e}.badge-shortlist{background:#dcfce7;color:#166534}.badge-deepdive{background:#dbeafe;color:#1e40af}.score{font-weight:800;color:#10b981}.dive-btn{background:#10b981;color:#fff;border:none;padding:10px 20px;border-radius:10px;cursor:pointer;font-weight:600}.panel{background:#fff;border-radius:16px;padding:32px;display:none;margin-top:24px}.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}.metric{background:#f8fafc;border-radius:12px;padding:24px;text-align:center}.metric-val{font-size:2.2em;font-weight:800;color:#1e293b}.metric-val.green{color:#059669}.metric-val.teal{color:#10b981}.metric-lbl{color:#64748b;font-size:14px;margin-top:6px}.back-btn{background:#64748b;color:#fff;border:none;padding:10px 24px;border-radius:10px;cursor:pointer;font-weight:600;margin-top:24px}</style></head><body><div class='header'><h1>RV Park Acquisitions Copilot v1.0</h1><p>25 Live Deals - SC/GA/NC/TN - Filter - Deep Dive Underwriting</p></div><div class='stats'><div class='stat'><div class='stat-num'>25</div><div>Total Deals</div></div><div class='stat'><div class='stat-num'>88</div><div>Top Score</div></div><div class='stat'><div class='stat-num'>20</div><div>New Leads</div></div></div><div class='filters'><button class='filter-btn active' onclick="filter(this,'all')">All (25)</button><button class='filter-btn' onclick="filter(this,'New')">New (20)</button><button class='filter-btn' onclick="filter(this,'Shortlist')">Shortlist (3)</button><button class='filter-btn' onclick="filter(this,'Deep dive')">Deep Dive (2)</button></div><div class='table-wrap'><table><thead><tr><th>ID</th><th>Name</th><th>State</th><th>Pads</th><th>Price</th><th>Cap%</th><th>Score</th><th>Status</th><th>Action</th></tr></thead><tbody id='tbody'></tbody></table></div><div class='panel' id='panel'><h2 id='panelTitle'>Deep Dive</h2><div class='metrics' id='topMetrics'></div><div class='metrics' id='bottomMetrics'></div><button class='back-btn' onclick="document.getElementById('panel').style.display='none'">Back</button></div><script>const names=['Palmetto Pines','Lakeview Estates','Greenwood Retreat','Blue Ridge Park','Smoky Valley RV','Sunset Acres','Cedar Creek','Magnolia Pines','River Bend RV','Lakeside Long Stay','Southern Oaks RV','Pineview Estates','Mountain Valley RV','Riverside Retreat','Creekside Park','Harvest Moon RV','Cardinal Ridge','Dogwood Acres','Cypress Bend RV','Heritage Pines','Trailhead RV','Riverbend Estates','Clover Hill RV','Autumn Ridge Park','Peach State RV'];const states=['SC','GA','NC','TN'];const deals=names.map((name,i)=>{const pads=42+Math.floor(i*2.8),price=2500000+i*290000,occ=65+Math.floor(i*1.1),curPad=520+(i%5)*20,mktPad=curPad+60+(i%4)*15,under=Math.round((1-curPad/mktPad)*100),t12Inc=Math.round(pads*curPad*12*(occ/100)),t12Noi=Math.round(t12Inc*0.58),curCap=+((t12Noi/price)*100).toFixed(1),stabNoi=Math.round(pads*mktPad*12*0.92*0.57),proCap=+((stabNoi/price)*100).toFixed(1),spread=Math.round((proCap-curCap)*100);return{id:'DEAL-'+String(i+1).padStart(4,'0'),name,state:states[i%4],pads,price:'$'+(price/1e6).toFixed(2)+'M',cap:curCap.toFixed(1)+'%',occ:occ+'%',score:Math.min(95,52+Math.floor(i*1.7)),status:i<20?'New':i<23?'Shortlist':'Deep dive',under:under+'%',curCap:curCap.toFixed(1)+'%',proCap:proCap.toFixed(1)+'%',spread:'+'+spread+' bps',t12Inc:'$'+t12Inc.toLocaleString(),t12Noi:'$'+t12Noi.toLocaleString(),totalPads:pads,expansion:(1.2+i*0.15).toFixed(1),breakEven:(52+i%15)+'%'};});let current='all';function render(){const tbody=document.getElementById('tbody');tbody.innerHTML='';deals.filter(d=>current==='all'||d.status===current).forEach(d=>{const badge=d.status==='New'?'badge-new':d.status==='Shortlist'?'badge-shortlist':'badge-deepdive';const tr=document.createElement('tr');tr.innerHTML='<td><b>'+d.id+'</b></td><td>'+d.name+'</td><td><b style=color:#059669>'+d.state+'</b></td><td>'+d.pads+'</td><td>'+d.price+'</td><td>'+d.cap+'</td><td class=score>'+d.score+'</td><td><span class=badge+badge>'+d.status+'</span></td><td><button class=dive-btn onclick=dive_'+d.id+'>Deep Dive</button></td>';tbody.appendChild(tr);});}function filter(btn,val){current=val;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');render();}function dive(id){const d=deals.find(x=>x.id===id);document.getElementById('panelTitle').textContent=d.name;document.getElementById('topMetrics').innerHTML='<div class=metric><div class=metric-val+green>'+d.under+'</div><div class=metric-lbl>Under Market</div></div><div class=metric><div class=metric-val>'+d.curCap+'</div><div class=metric-lbl>Current Cap</div></div><div class=metric><div class=metric-val>'+d.proCap+'</div><div class=metric-lbl>Pro-forma Cap</div></div><div class=metric><div class=metric-val+teal>'+d.spread+'</div><div class=metric-lbl>Cap Spread</div></div>';document.getElementById('bottomMetrics').innerHTML='<div class=metric><div class=metric-val>'+d.t12Inc+'</div><div class=metric-lbl>T-12 Income</div></div><div class=metric><div class=metric-val>'+d.t12Noi+'</div><div class=metric-lbl>T-12 NOI</div></div><div class=metric><div class=metric-val>'+d.totalPads+'</div><div class=metric-lbl>Total Pads</div></div><div class=metric><div class=metric-val>'+d.expansion+'</div><div class=metric-lbl>Expansion Acres</div></div>';const p=document.getElementById('panel');p.style.display='block';p.scrollIntoView({behavior:'smooth'});}render();</script></body></html>
